<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai - Links</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* باکگراوندێ ئەسمانی و ستێرکا */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* دروستکرنا هەسارەیان */
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);
            animation: float 10s infinite ease-in-out;
        }

        .moon { width: 40px; height: 40px; background: #ddd; top: 10%; left: 15%; box-shadow: 0 0 15px white; }
        .mars { width: 60px; height: 60px; background: #e74c3c; top: 20%; right: 10%; animation-duration: 12s; }
        .jupiter { width: 100px; height: 100px; background: #d39d7e; bottom: 15%; left: 10%; animation-duration: 15s; }
        .saturn { 
            width: 80px; height: 80px; background: #f4d03f; bottom: 20%; right: 15%; 
            border: 4px solid rgba(244, 208, 63, 0.3); animation-duration: 18s; 
        }
        .earth { width: 70px; height: 70px; background: #2874a6; top: 50%; left: 5%; animation-duration: 20s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* ناڤ و تێکست */
        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 300px;
        }

        h2 { font-size: 1.2rem; opacity: 0.8; margin-bottom: 5px; }
        h1 { font-size: 2.5rem; margin-top: 0; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }

        /* دوگمەیێن سۆشیال میدیایێ */
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .link-card {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* ئایکۆنێن ب جوولە */
        .link-card i {
            font-size: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="planet moon"></div>
        <div class="planet mars"></div>
        <div class="planet jupiter"></div>
        <div class="planet saturn"></div>
        <div class="planet earth"></div>
    </div>

    <div class="container">
        <h2>Welcome</h2>
        <h1>Tech Ai</h1>
        
        <div class="links">
            <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" class="link-card" target="_blank">
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TZdN7XgRN" class="link-card" target="_blank">
                <span>TikTok</span>
            </a>
            <a href="https://t.me/tech_ai_falah" class="link-card" target="_blank">
                <span>Telegram</span>
            </a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Space Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00d4ff;
            --bg: #050b1a;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #050b1a 0%, #000 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Shooting Stars --- */
        .night { position: fixed; width: 100%; height: 100%; transform: rotateZ(45deg); z-index: -1; }
        .shooting_star {
            position: absolute; left: 50%; top: 50%; height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px; filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
        }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }

        /* --- Neon Glow Brand --- */
        .brand-container { margin-top: 100px; text-align: center; }
        .brand-name {
            font-size: 3.5rem; font-weight: 900;
            color: #fff; text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon), 0 0 40px var(--neon);
            border: 4px solid var(--neon);
            padding: 10px 40px; border-radius: 15px;
            box-shadow: 0 0 15px var(--neon), inset 0 0 15px var(--neon);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }

        /* --- Contact Form --- */
        .contact-box {
            margin-top: 50px; background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.3); width: 320px;
        }
        .contact-box input, .contact-box textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--neon);
            border-radius: 8px; color: white; box-sizing: border-box;
        }
        .contact-box button {
            width: 100%; padding: 12px; background: var(--neon);
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .contact-box button:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.02); }

        /* --- Live Time & Controls --- */
        .footer-info { position: fixed; bottom: 20px; left: 20px; color: var(--neon); font-size: 1.1rem; }
        .music-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 55px; height: 55px; background: var(--neon);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: black; font-size: 1.5rem; z-index: 100;
        }

        /* Tooltip Style */
        [data-title]:hover:after {
            content: attr(data-title);
            position: absolute; bottom: 65px; background: white; color: black;
            padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="night" id="shooting-stars-container"></div>

    <div class="brand-container">
        <h1 class="brand-name" data-title="بخێر بێی بۆ سایتێ من">Tech Ai</h1>
    </div>

    <div class="contact-box">
        <h3 style="text-align:center; color: var(--neon);">Contact Me</h3>
        <input type="text" id="name" placeholder="Navê te...">
        <textarea id="message" rows="3" placeholder="Nameya te..."></textarea>
        <button onclick="sendTelegram()">Send to Telegram</button>
    </div>

    <div class="footer-info" id="clock">00:00:00</div>

    <div class="music-btn" onclick="controlMusic()" data-title="کارپێکرنا موزیکێ">
        <i id="music-icon" class="fas fa-play"></i>
    </div>

    <div id="player" style="position: absolute; top: -1000px;"></div>

    <script>
        // 1. Shooting Stars Generator
        const container = document.getElementById('shooting-stars-container');
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting_star';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = (Math.random() * 3000) + 'ms';
            container.appendChild(star);
        }

        // 2. Live Clock
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);

        // 3. Telegram Link Logic
        function sendTelegram() {
            const name = document.getElementById('name').value;
            const msg = document.getElementById('message').value;
            if(name && msg) {
                const url = `https://t.me/falahzakho?text=Slav! Ez ${name} me. Name: ${msg}`;
                window.open(url, '_blank');
            } else { alert("هیڤی دکەم ناڤ و نامێ بنڤێسە"); }
        }

        // 4. YouTube Audio Control
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'WI3F9RKSAQY',
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) { console.log("Music Ready"); }

        let playing = false;
        function controlMusic() {
            const icon = document.getElementById('music-icon');
            if (!playing) {
                player.playVideo();
                icon.className = 'fas fa-pause';
                playing = true;
            } else {
                player.pauseVideo();
                icon.className = 'fas fa-play';
                playing = false;
            }
        }
    </script>
</body>
</html>
